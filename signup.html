<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#F7F4EF">
<title>4848 體驗報告 · 報名表單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4EF; --ink:#2C2A26; --ink-mid:#4A4742; --ink-light:#5A5650;
  --gold:#C9A96E; --gold-pale:#E8D9BA; --border:#DDD8CF; --white:#FDFCF9;
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html{ -webkit-text-size-adjust:100%; }
body{ background:var(--bg); color:var(--ink); font-family:'Noto Sans TC',sans-serif; font-weight:300; min-height:100vh; }

.page{ max-width:640px; margin:0 auto; padding:24px 20px 60px; }

/* TOP BAR */
.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
.brand{ font-size:12px; letter-spacing:0.26em; color:#9A968F; text-transform:uppercase; font-weight:300; }
.back-btn{ font-size:13px; color:var(--gold); letter-spacing:0.12em; cursor:pointer; background:none; border:none; font-family:'Noto Sans TC',sans-serif; padding:0; border-bottom:1px solid var(--gold-pale); line-height:2.2; }

/* RULE */
.rule{ width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:20px 0; }

/* HEADER */
.form-eyebrow{ font-size:12px; letter-spacing:0.30em; color:var(--gold); font-weight:400; margin-bottom:10px; line-height:2.2; }
.form-title{ font-family:'Noto Serif TC',serif; font-size:clamp(20px,5vw,26px); font-weight:700; color:var(--ink); line-height:1.6; letter-spacing:0.06em; margin-bottom:12px; }
.form-desc{ font-size:clamp(13px,3.5vw,15px); color:var(--ink-mid); line-height:2.4; letter-spacing:0.04em; }
.form-desc strong{ font-weight:500; color:var(--ink); }

/* NOTICE */
.notice-box{ background:linear-gradient(135deg,#FDFAF4,#F7F0E2); border:1px solid var(--gold-pale); border-radius:8px; padding:16px 18px; margin:20px 0; }
.notice-title{ font-family:'Noto Serif TC',serif; font-size:13px; font-weight:500; color:var(--gold); letter-spacing:0.14em; margin-bottom:8px; line-height:1.9; }
.notice-steps{ display:flex; flex-direction:column; gap:7px; }
.notice-step{ display:flex; gap:10px; align-items:flex-start; }
.notice-step-num{ flex-shrink:0; width:20px; height:20px; border:1px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--gold); margin-top:3px; }
.notice-step-text{ font-size:13px; color:var(--ink-mid); line-height:2.1; letter-spacing:0.04em; }

/* PAYMENT BLOCK */
.payment-block{ background:var(--white); border:1px solid var(--gold-pale); border-left:4px solid var(--gold); border-radius:0 8px 8px 0; padding:16px 18px; margin:20px 0; }
.payment-title{ font-family:'Noto Serif TC',serif; font-size:14px; font-weight:700; color:var(--ink); letter-spacing:0.10em; margin-bottom:10px; line-height:1.9; }
.payment-row{ font-size:13px; color:var(--ink-mid); line-height:2.3; letter-spacing:0.04em; }
.payment-acct{ font-family:'Noto Serif TC',serif; font-size:16px; font-weight:700; color:var(--ink); letter-spacing:0.12em; line-height:2.0; }
.payment-note{ font-size:12px; color:var(--ink-light); letter-spacing:0.08em; line-height:1.9; margin-top:6px; }

/* GOOGLE FORM IFRAME WRAPPER */
.gform-wrap{
  width:100%;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin:20px 0;
  /* min-height prevents layout jump while iframe loads */
  min-height:600px;
  display:flex; flex-direction:column;
}
.gform-loading{
  padding:40px 24px;
  text-align:center;
  font-size:13px; color:var(--ink-light); letter-spacing:0.12em; line-height:2.2;
  flex:1; display:flex; align-items:center; justify-content:center;
}
.gform-iframe{
  width:100%;
  border:none;
  /* Height auto-grows; set a tall enough min */
  min-height:900px;
  display:block;
}

/* FOOTER */
.page-foot{ margin-top:28px; padding-top:18px; border-top:1px solid var(--border); text-align:center; }
.foot-text{ font-size:12px; color:#9A968F; letter-spacing:0.18em; line-height:2.2; }
.foot-text a{ color:var(--gold); text-decoration:none; }

@supports (padding:max(0px)){
  .page{ padding-bottom:max(60px,env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>
<div class="page">

  <div class="top-bar">
    <span class="brand">StateFlow Lab · 4848</span>
    <button class="back-btn" onclick="history.back()">← 返回</button>
  </div>

  <div class="form-eyebrow">4848 全方位體驗報告</div>
  <h1 class="form-title">填寫報名資料</h1>
  <p class="form-desc">填寫以下報名資料，填寫後資料直接儲存至我們的系統。<br><strong>填寫完成後，請務必完成匯款以便查詢。</strong></p>

  <div class="rule"></div>

  <!-- 流程說明 -->
  <div class="notice-box">
    <div class="notice-title">報名流程</div>
    <div class="notice-steps">
      <div class="notice-step"><div class="notice-step-num">1</div><div class="notice-step-text">填寫以下報名資料</div></div>
      <div class="notice-step"><div class="notice-step-num">2</div><div class="notice-step-text">完成 NT$ 499 匯款</div></div>
      <div class="notice-step"><div class="notice-step-num">3</div><div class="notice-step-text">我們確認入帳後開始製作報告</div></div>
      <div class="notice-step"><div class="notice-step-num">4</div><div class="notice-step-text">完成後直接交付給你</div></div>
    </div>
  </div>

  <!-- 匯款資訊 -->
  <div class="payment-block">
    <div class="payment-title">⚠️ 請填寫完成後完成匯款</div>
    <div class="payment-row">匯款金額：<strong>NT$ 499</strong></div>
    <div class="payment-acct">013 國泰世華銀行</div>
    <div class="payment-acct">帳號：007700002068</div>
    <div class="payment-note">匯款完成後，我們確認入帳即開始製作你的報告，完成後直接交付</div>
  </div>

  <!-- Google Form 原生 iframe -->
  <div class="gform-wrap" id="gformWrap">
    <div class="gform-loading" id="gformLoading">載入表單中…</div>
    <iframe
      class="gform-iframe"
      id="gformIframe"
      src="https://docs.google.com/forms/d/e/1FAIpQLSc8voOY-L8Qb3YTx7xiD9Vp5HJ9kF7USeo9KxhgG9WO0-59-A/viewform?embedded=true"
      title="4848 體驗報告報名表單"
      style="display:none;"
      onload="this.style.display='block'; document.getElementById('gformLoading').style.display='none';"
    >
      <!-- Fallback if iframe blocked -->
      載入中，請稍候…
    </iframe>
  </div>

  <div class="page-foot">
    <div class="foot-text">
      Copyright 2026 · StateFlow Lab · 4848<br>
      IG：<a href="https://www.instagram.com/anan_teacter/" target="_blank">@anan_teacter</a>
    </div>
  </div>

</div>

<script>
// Auto-resize iframe based on content (best-effort, same-origin only)
// For cross-origin Google Forms, we rely on min-height
// Fallback: if iframe doesn't load in 8s, show direct link
setTimeout(function(){
  var loading = document.getElementById('gformLoading');
  var iframe  = document.getElementById('gformIframe');
  if(loading && loading.style.display !== 'none'){
    loading.innerHTML =
      '表單載入中…如長時間未顯示，請<br>' +
      '<a href="https://docs.google.com/forms/d/e/1FAIpQLSc8voOY-L8Qb3YTx7xiD9Vp5HJ9kF7USeo9KxhgG9WO0-59-A/viewform" ' +
      'target="_blank" style="color:#C9A96E;text-decoration:none;border-bottom:1px solid #E8D9BA;">' +
      '點此直接開啟 Google 表單 →</a>';
  }
}, 8000);
</script>
</body>
</html>
